<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Ads Intelligence</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a}
    input::placeholder,textarea::placeholder{color:#444}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#111}
    ::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;
const spendColors={"Low":"#4ade80","Medium":"#facc15","High":"#fb923c","Very High":"#f87171"};
const formatColors={"Video":"#818cf8","Static":"#67e8f9","Carousel":"#f9a8d4"};
const hookTypeColors={"Pattern Interrupt":"#fb923c","Social Proof":"#4ade80","Fear":"#f87171","Curiosity":"#818cf8","Controversy":"#facc15"};
const GRADE_COLORS={"A":"#4ade80","A+":"#4ade80","A-":"#4ade80","B":"#818cf8","B+":"#818cf8","B-":"#818cf8","C":"#facc15","D":"#fb923c","F":"#f87171"};
const SYSTEM_PROMPT=["You are an elite Meta Ads intelligence analyst. Always respond in valid JSON only.",
"ANALYSIS MODE return: {market_summary,competitors:[{name,positioning,top_angles,hook_patterns,spend_tier,weakness,best_ad_format}],market_patterns:{dominant_hooks,winning_angles,overused_angles,content_gaps},winning_formula}",
"GENERATION MODE return: {hooks:[{text,type,why_it_wins,score}],ad_concepts:[{title,angle,headline,body_copy,cta,format,why_it_beats_competition,score,preview_accent}],strategic_edge}",
"SCORING MODE return: {scores:[{id,score,grade,breakdown:{hook_strength,offer_clarity,emotional_pull,differentiation,cta_strength},verdict,top_fix}],overall_grade,top_performer,coaching}",
"VARIATIONS MODE return: {variations:[{label,headline,body_copy,cta,hook,tone,key_difference}]}"
].join("\n");

const compress=s=>{try{return btoa(unescape(encodeURIComponent(JSON.stringify(s))));}catch{return'';}};
const decompress=s=>{try{return JSON.parse(decodeURIComponent(escape(atob(s))));}catch{return null;}};
const copyText=text=>{try{navigator.clipboard.writeText(text);}catch{const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}};
function toPlainText(product,analysis,generated){
  let o="META ADS INTELLIGENCE REPORT\n"+"=".repeat(44)+"\nProduct: "+product+"\nDate: "+new Date().toLocaleString()+"\n\n";
  if(analysis){
    o+="MARKET OVERVIEW\n"+"-".repeat(30)+"\n"+analysis.market_summary+"\nWinning Formula: "+analysis.winning_formula+"\n\nCOMPETITORS\n"+"-".repeat(30)+"\n";
    (analysis.competitors||[]).forEach(c=>{o+="\n"+c.name+" ["+c.spend_tier+" | "+c.best_ad_format+"]\nPositioning: "+c.positioning+"\nAngles: "+(c.top_angles||[]).join(', ')+"\nWeakness: "+c.weakness+"\n";});
    const p=analysis.market_patterns||{};
    o+="\nDominant Hooks: "+(p.dominant_hooks||[]).join(', ')+"\nContent Gaps: "+(p.content_gaps||[]).join(', ')+"\n";
  }
  if(generated){
    o+="\nGENERATED HOOKS\n"+"-".repeat(30)+"\n";
    (generated.hooks||[]).forEach((h,i)=>{o+=(i+1)+". ["+h.type+"] "+h.text+"\n   → "+h.why_it_wins+"\n";});
    o+="\nAD CONCEPTS\n"+"-".repeat(30)+"\n";
    (generated.ad_concepts||[]).forEach((c,i)=>{o+="\nConcept "+(i+1)+": "+c.title+"\nFormat: "+c.format+" | Angle: "+c.angle+"\nHeadline: "+c.headline+"\nCopy: "+c.body_copy+"\nCTA: "+c.cta+"\nEdge: "+c.why_it_beats_competition+"\n";});
    o+="\nSTRATEGIC EDGE\n"+"-".repeat(30)+"\n"+generated.strategic_edge+"\n";
  }
  return o;
}

function Scanline(){return React.createElement('div',{style:{position:'absolute',inset:0,pointerEvents:'none',zIndex:0,background:'repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)',borderRadius:'inherit'}});}
function TypewriterText({text,speed=10}){
  const[d,setD]=useState('');
  useEffect(()=>{setD('');let i=0;const iv=setInterval(()=>{if(i<text.length){setD(text.slice(0,++i));}else clearInterval(iv);},speed);return()=>clearInterval(iv);},[text]);
  return <span>{d}</span>;
}
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2400);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:28,right:28,zIndex:9999,background:'#161616',border:'1px solid rgba(74,222,128,0.35)',borderRadius:10,padding:'12px 20px',color:'#4ade80',fontSize:13,fontFamily:"'DM Mono',monospace",boxShadow:'0 8px 32px rgba(0,0,0,0.6)',animation:'fadeIn .25s ease'}}>✓ {msg}</div>;
}
function hexToRgb(hex){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);return r?(parseInt(r[1],16)+","+parseInt(r[2],16)+","+parseInt(r[3],16)):'255,107,0';}
function ScoreBar({label,value,color='#ff6b00'}){
  return <div style={{marginBottom:10}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:10,color:'#777',letterSpacing:'0.1em',textTransform:'uppercase'}}>{label}</span><span style={{fontSize:11,color,fontWeight:600}}>{value}</span></div><div style={{height:3,background:'rgba(255,255,255,0.06)',borderRadius:2}}><div style={{height:'100%',width:value+"%",background:"linear-gradient(90deg,"+color+"88,"+color+")",borderRadius:2,transition:'width 1s ease'}}/></div></div>;
}
function GradeCircle({grade}){
  const col=GRADE_COLORS[grade]||'#888';
  return <div style={{width:52,height:52,borderRadius:'50%',border:"2px solid "+col,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:col+"18"}}><span style={{fontSize:18,fontWeight:700,color:col}}>{grade}</span></div>;
}

function AdMockup({concept}){
  const accent=concept.preview_accent||'#ff6b00';
  const fmt=concept.format;
  const cardBase={borderRadius:12,overflow:'hidden',border:'1px solid rgba(255,255,255,0.1)',fontFamily:"'DM Mono',monospace"};
  if(fmt==='Carousel')return(
    <div style={{...cardBase,background:'#0d0d0d',maxWidth:380}}>
      <div style={{display:'flex',gap:2}}>
        {['main','2','3'].map((_,i)=>(<div key={i} style={{flex:1,height:160,background:i===0?'linear-gradient(135deg,#1a1a2e,#0d0d1a)':'#111',display:'flex',alignItems:'center',justifyContent:'center',borderRight:i<2?'1px solid rgba(255,255,255,0.05)':undefined}}>{i===0?(<div style={{padding:14,textAlign:'center'}}><div style={{fontSize:9,color:accent,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:8}}>SLIDE 1</div><div style={{fontSize:12,fontWeight:700,color:'#fff',lineHeight:1.4}}>{concept.headline}</div></div>):(<div style={{color:'#2a2a2a',fontSize:20}}>◈</div>)}</div>))}
      </div>
      <div style={{padding:'12px 16px',background:'#0d0d0d',borderTop:'1px solid rgba(255,255,255,0.06)'}}><div style={{fontSize:11,color:'#bbb',marginBottom:8,lineHeight:1.6}}>{concept.body_copy?.substring(0,90)}…</div><span style={{background:accent,color:'#fff',fontSize:11,fontWeight:700,padding:'5px 14px',borderRadius:4,display:'inline-block'}}>{concept.cta}</span></div>
    </div>
  );
  if(fmt==='Video')return(
    <div style={{...cardBase,background:'#0d0d0d',maxWidth:220}}>
      <div style={{height:340,background:'linear-gradient(175deg,#1a1a2e,#0a0a0a)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',padding:20}}>
        <div style={{position:'absolute',top:10,left:10,right:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:22,height:22,borderRadius:'50%',background:accent}}/><span style={{fontSize:10,color:'#fff',fontWeight:600}}>Brand</span></div><div style={{fontSize:8,color:'rgba(255,255,255,0.5)',background:'rgba(0,0,0,0.5)',padding:'2px 6px',borderRadius:3}}>SPONSORED</div></div>
        <div style={{width:44,height:44,borderRadius:'50%',background:'rgba(255,255,255,0.08)',border:'2px solid rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14}}><span style={{fontSize:18,color:'#fff',marginLeft:3}}>▶</span></div>
        <div style={{fontSize:13,fontWeight:700,color:'#fff',textAlign:'center',lineHeight:1.4,marginBottom:8}}>{concept.headline}</div>
        <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',textAlign:'center',lineHeight:1.5}}>{concept.body_copy?.substring(0,60)}…</div>
        <div style={{position:'absolute',bottom:12,left:12,right:12,background:accent,color:'#fff',fontSize:11,fontWeight:700,padding:'7px',borderRadius:6,textAlign:'center'}}>{concept.cta}</div>
      </div>
    </div>
  );
  return(
    <div style={{...cardBase,background:'#0d0d0d',maxWidth:320}}>
      <div style={{height:180,background:'linear-gradient(135deg,#1a1a2e,#0a0a14)',display:'flex',alignItems:'center',justifyContent:'center',padding:24,position:'relative'}}><div style={{position:'absolute',top:10,right:10,fontSize:8,color:'rgba(255,255,255,0.4)',background:'rgba(0,0,0,0.5)',padding:'2px 7px',borderRadius:3}}>SPONSORED</div><div style={{textAlign:'center'}}><div style={{fontSize:9,color:accent,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:10}}>{concept.angle}</div><div style={{fontSize:15,fontWeight:700,color:'#fff',lineHeight:1.35}}>{concept.headline}</div></div></div>
      <div style={{padding:'12px 16px',background:'#0d0d0d',borderTop:'1px solid rgba(255,255,255,0.06)'}}><div style={{fontSize:11,color:'#bbb',marginBottom:10,lineHeight:1.6}}>{concept.body_copy?.substring(0,100)}…</div><div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}><span style={{fontSize:10,color:'#444'}}>yourbrand.com</span><span style={{background:accent,color:'#fff',fontSize:11,fontWeight:700,padding:'5px 14px',borderRadius:4}}>{concept.cta}</span></div></div>
    </div>
  );
}

function HistoryPanel({history,onLoad,onDelete,onClose}){
  return(
    <div style={{position:'fixed',top:0,right:0,bottom:0,width:340,background:'#101010',borderLeft:'1px solid rgba(255,107,0,0.15)',zIndex:500,overflowY:'auto',fontFamily:"'DM Mono',monospace",animation:'slideIn .25s ease'}}>
      <div style={{padding:24,borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#101010',zIndex:1}}><span style={{fontSize:11,letterSpacing:'0.2em',color:'#ff6b00',textTransform:'uppercase'}}>Session History</span><button onClick={onClose} style={{background:'none',border:'none',color:'#555',fontSize:20,cursor:'pointer',lineHeight:1}}>✕</button></div>
      <div style={{padding:'16px 20px'}}>
        {history.length===0&&<p style={{color:'#444',fontSize:13,marginTop:8}}>No saved sessions yet. Run an analysis to auto-save.</p>}
        {history.map(s=>(
          <div key={s.id} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:8,padding:14,marginBottom:10}}>
            <div style={{fontSize:13,color:'#ddd',marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.product}</div>
            <div style={{fontSize:10,color:'#444',marginBottom:10}}>{new Date(s.ts).toLocaleString()}</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>onLoad(s)} style={{flex:1,background:'rgba(255,107,0,0.12)',border:'1px solid rgba(255,107,0,0.25)',borderRadius:5,padding:'6px 0',color:'#ff9500',fontSize:11,fontFamily:'inherit',cursor:'pointer'}}>Load</button>
              <button onClick={()=>onDelete(s.id)} style={{background:'rgba(248,113,113,0.08)',border:'1px solid rgba(248,113,113,0.18)',borderRadius:5,padding:'6px 12px',color:'#f87171',fontSize:11,fontFamily:'inherit',cursor:'pointer'}}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
function ShareModal({url,onClose,onCopy}){
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{background:'#111',border:'1px solid rgba(255,107,0,0.25)',borderRadius:14,padding:32,maxWidth:540,width:'100%',fontFamily:"'DM Mono',monospace"}}>
        <div style={{fontSize:11,letterSpacing:'0.2em',color:'#ff6b00',textTransform:'uppercase',marginBottom:14}}>Share This Analysis</div>
        <p style={{fontSize:13,color:'#666',marginBottom:16,lineHeight:1.7}}>This URL encodes your full analysis. Anyone with it can load results instantly — no API key needed to view.</p>
        <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,padding:'12px 14px',marginBottom:16,wordBreak:'break-all',fontSize:11,color:'#aaa',lineHeight:1.7,maxHeight:100,overflowY:'auto'}}>{url}</div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onCopy} style={{flex:1,background:'rgba(255,107,0,0.18)',border:'1px solid rgba(255,107,0,0.35)',borderRadius:8,padding:'10px 0',color:'#ff9500',fontSize:13,fontFamily:'inherit',cursor:'pointer',fontWeight:600}}>Copy URL</button>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,padding:'10px 20px',color:'#666',fontSize:13,fontFamily:'inherit',cursor:'pointer'}}>Close</button>
        </div>
      </div>
    </div>
  );
}

function MetaAdsIntel(){
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem('mai_key')||'');
  const[showKey,setShowKey]=useState(false);
  const[product,setProduct]=useState('');
  const[competitors,setCompetitors]=useState('');
  const[adsSeen,setAdsSeen]=useState('');
  const[phase,setPhase]=useState('input');
  const[error,setError]=useState(null);
  const[analysis,setAnalysis]=useState(null);
  const[generated,setGenerated]=useState(null);
  const[scores,setScores]=useState(null);
  const[variations,setVariations]=useState(null);
  const[varSource,setVarSource]=useState(null);
  const[activeTab,setActiveTab]=useState('analysis');
  const[activeCmp,setActiveCmp]=useState(0);
  const[activeHook,setActiveHook]=useState(null);
  const[activeCon,setActiveCon]=useState(0);
  const[activeScore,setActiveScore]=useState(0);
  const[history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem('mai_history')||'[]');}catch{return[];}});
  const[showHistory,setShowHistory]=useState(false);
  const[toast,setToast]=useState(null);
  const[shareUrl,setShareUrl]=useState('');
  const[showShare,setShowShare]=useState(false);
  const resultRef=useRef(null);
  const showToast=msg=>setToast(msg);
  const saveKey=k=>{setApiKey(k);localStorage.setItem('mai_key',k);};

  useEffect(()=>{
    const h=window.location.hash?.slice(1);
    if(!h)return;
    const s=decompress(h);
    if(!s)return;
    if(s.product)setProduct(s.product);
    if(s.competitors)setCompetitors(s.competitors);
    if(s.analysis){setAnalysis(s.analysis);setPhase('results');setActiveTab('analysis');}
    if(s.generated){setGenerated(s.generated);setPhase('generated');}
    if(s.scores)setScores(s.scores);
    window.history.replaceState(null,'',window.location.pathname);
    showToast('Loaded from shared link!');
  },[]);

  const callClaude=async(msg,maxTok=4096)=>{
    if(!apiKey.trim())throw new Error('API key required');
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,system:SYSTEM_PROMPT,messages:[{role:'user',content:msg}]})
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'API error '+r.status);}
    const d=await r.json();
    let t=d.content?.map(b=>b.text||'').join('').trim();
    t=t.replace(/^```(?:json)?\s*\n?/i,'').replace(/\n?```\s*$/i,'');
    return JSON.parse(t);
  };

  const saveSession=useCallback((prod,anal,gen,sc)=>{
    const e={id:Date.now().toString(),ts:Date.now(),product:prod,analysis:anal,generated:gen,scores:sc||null};
    setHistory(prev=>{const n=[e,...prev].slice(0,25);localStorage.setItem('mai_history',JSON.stringify(n));return n;});
  },[]);

  const loadSession=s=>{
    setProduct(s.product||'');setCompetitors('');setAdsSeen('');
    setAnalysis(s.analysis||null);setGenerated(s.generated||null);setScores(s.scores||null);
    setVariations(null);setActiveTab('analysis');setActiveCmp(0);setActiveCon(0);
    setPhase(s.generated?'generated':s.analysis?'results':'input');
    setShowHistory(false);showToast('Session loaded!');
  };
  const deleteSession=id=>{setHistory(prev=>{const n=prev.filter(s=>s.id!==id);localStorage.setItem('mai_history',JSON.stringify(n));return n;});};

  const runAnalysis=async()=>{
    if(!product.trim()||!apiKey.trim()){setError('Enter your API key and product niche.');return;}
    setError(null);setPhase('analyzing');
    try{
      const res=await callClaude('ANALYSIS MODE\nProduct/Niche: '+product+'\nCompetitors: '+(competitors||'Identify likely competitors')+'\nAds seen: '+(adsSeen||'None — infer from market knowledge')+'\nReturn JSON only.');
      setAnalysis(res);setPhase('results');setActiveTab('analysis');
      setTimeout(()=>resultRef.current?.scrollIntoView({behavior:'smooth'}),100);
    }catch(e){setError(e.message||'Analysis failed.');setPhase('input');}
  };

  const runGeneration=async()=>{
    setPhase('generating');setError(null);
    try{
      const res=await callClaude('GENERATION MODE\nProduct/Niche: '+product+'\nAnalysis: '+JSON.stringify(analysis)+'\nGenerate superior hooks and ad concepts. Return JSON only.');
      setGenerated(res);setPhase('generated');setActiveTab('analysis');
      saveSession(product,analysis,res,null);
    }catch(e){setError(e.message||'Generation failed.');setPhase('results');}
  };

  const runScoring=async()=>{
    if(!generated?.ad_concepts)return;
    setPhase('scoring');setError(null);
    try{
      const items=generated.ad_concepts.map((c,i)=>({id:'concept_'+i,...c}));
      const res=await callClaude('SCORING MODE\nProduct: '+product+'\nMarket: '+JSON.stringify({market_summary:analysis?.market_summary,winning_formula:analysis?.winning_formula,market_patterns:analysis?.market_patterns})+'\nConcepts: '+JSON.stringify(items)+'\nReturn JSON only.',2048);
      setScores(res);setPhase('generated');setActiveTab('scoring');
      saveSession(product,analysis,generated,res);
    }catch(e){setError(e.message||'Scoring failed.');setPhase('generated');}
  };

  const runVariations=async idx=>{
    const concept=generated?.ad_concepts?.[idx];
    if(!concept)return;
    setVarSource(idx);setPhase('variations_loading');setError(null);
    try{
      const res=await callClaude('VARIATIONS MODE\nProduct: '+product+'\nOriginal concept: '+JSON.stringify(concept)+'\nMarket context: '+(analysis?.winning_formula||'')+'\nGenerate 4 A/B variation rewrites, each with different angle/tone. Return JSON only.',3000);
      setVariations(res);setPhase('generated');setActiveTab('variations');
    }catch(e){setError(e.message||'Variation failed.');setPhase('generated');}
  };

  const doShare=()=>{
    const s={product,competitors,analysis,generated,scores};
    const url=location.origin+location.pathname+'#'+compress(s);
    setShareUrl(url);setShowShare(true);
  };
  const doExportTxt=()=>{
    const txt=toPlainText(product,analysis,generated);
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
    a.download='mai-'+product.slice(0,20).replace(/\s+/g,'-')+'-'+Date.now()+'.txt';
    a.click();showToast('Exported as TXT!');
  };
  const doExportJson=()=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([JSON.stringify({product,competitors,analysis,generated,scores,date:new Date().toISOString()},null,2)],{type:'application/json'}));
    a.download='mai-'+Date.now()+'.json';a.click();showToast('Exported as JSON!');
  };
  const doCopy=()=>{copyText(toPlainText(product,analysis,generated));showToast('Copied to clipboard!');};
  const reset=()=>{
    setPhase('input');setAnalysis(null);setGenerated(null);setScores(null);setVariations(null);setError(null);
    setProduct('');setCompetitors('');setAdsSeen('');setActiveTab('analysis');setActiveCmp(0);setActiveCon(0);setVarSource(null);
  };
  const isLoading=['analyzing','generating','scoring','variations_loading'].includes(phase);
  const loadingMsg={analyzing:'Scanning the competitive landscape…',generating:'Building your winning ad strategy…',scoring:'Grading each concept against the market…',variations_loading:'Spinning up A/B variations…'}[phase]||'Working…';
  const hasResults=!!analysis;
  const hasGenerated=!!generated;

  const inp=(ph,val,set,label,placeholder,rows)=>rows?(
    <div style={{marginBottom:20}}>
      <label style={{display:'block',fontSize:11,letterSpacing:'0.15em',color:'#ff6b00',textTransform:'uppercase',marginBottom:8}}>{label}</label>
      <textarea value={val} onChange={e=>set(e.target.value)} placeholder={placeholder} disabled={ph==='analyzing'} rows={rows} style={{width:'100%',background:'rgba(0,0,0,0.4)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,padding:'12px 16px',color:'#e2e2e2',fontSize:14,fontFamily:'inherit',outline:'none',resize:'vertical',transition:'border-color .2s'}} onFocus={e=>e.target.style.borderColor='rgba(255,107,0,0.5)'} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,0.1)'}/>
    </div>
  ):(
    <div style={{marginBottom:20}}>

                  {generated.ad_concepts?.map((c,i)=>(<button key={i} onClick={()=>setActiveCon(i)} style={{background:activeCon===i?'rgba(129,140,248,0.2)':'rgba(255,255,255,0.04)',border:'1px solid '+(activeCon===i?'rgba(129,140,248,0.6)':'rgba(255,255,255,0.1)'),borderRadius:6,padding:'7px 14px',color:activeCon===i?'#818cf8':'#888',fontSize:12,fontFamily:'inherit',cursor:'pointer'}}>{c.title}</button>))}
                </div>
                {generated.ad_concepts?.[activeCon]&&(
                  <div style={{display:'flex',gap:32,alignItems:'flex-start',flexWrap:'wrap'}}>
                    <AdMockup concept={generated.ad_concepts[activeCon]}/>
                    <div style={{flex:1,minWidth:240}}>
                      <div style={{fontSize:11,color:'#ff6b00',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:12}}>Concept Details</div>
                      <div style={{marginBottom:12}}><span style={{fontSize:11,color:'#666',textTransform:'uppercase',letterSpacing:'0.1em'}}>Format: </span><span style={{fontSize:13,color:formatColors[generated.ad_concepts[activeCon].format]||'#ccc'}}>{generated.ad_concepts[activeCon].format}</span></div>
                      <div style={{marginBottom:12}}><span style={{fontSize:11,color:'#666',textTransform:'uppercase',letterSpacing:'0.1em'}}>Angle: </span><span style={{fontSize:13,color:'#ccc'}}>{generated.ad_concepts[activeCon].angle}</span></div>
                      <div style={{marginBottom:12}}><span style={{fontSize:11,color:'#666',textTransform:'uppercase',letterSpacing:'0.1em'}}>Headline: </span><span style={{fontSize:13,color:'#fff',fontWeight:600}}>{generated.ad_concepts[activeCon].headline}</span></div>
                      <div style={{marginBottom:12}}><span style={{fontSize:11,color:'#666',textTransform:'uppercase',letterSpacing:'0.1em'}}>CTA: </span><span style={{fontSize:13,color:'#ff9500'}}>{generated.ad_concepts[activeCon].cta}</span></div>
                      <div style={{fontSize:13,color:'#bbb',lineHeight:1.7,marginBottom:16}}>{generated.ad_concepts[activeCon].body_copy}</div>
                      <button onClick={()=>runVariations(activeCon)} style={{background:'rgba(250,204,21,0.1)',border:'1px solid rgba(250,204,21,0.25)',borderRadius:6,padding:'10px 16px',color:'#facc15',fontSize:11,fontFamily:'inherit',cursor:'pointer',width:'100%'}}>⊕ Generate A/B Variations</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* SCORING TAB */}
            {hasGenerated&&activeTab==='scoring'&&(
              <div>
                <div style={{fontSize:11,letterSpacing:'0.15em',color:'#666',textTransform:'uppercase',marginBottom:20}}>// Ad Concept Scoring</div>
                {!scores&&phase!=='scoring'&&(
                  <div style={{textAlign:'center',padding:40,background:'rgba(255,255,255,0.02)',borderRadius:12,border:'1px solid rgba(255,255,255,0.07)'}}>
                    <p style={{color:'#666',fontSize:14,marginBottom:20}}>Have Claude grade each ad concept against the competitive landscape.</p>
                    <button onClick={runScoring} style={{background:'linear-gradient(135deg,#ff6b00,#ff9500)',border:'none',borderRadius:8,padding:'14px 32px',color:'#fff',fontSize:14,fontFamily:'inherit',cursor:'pointer',fontWeight:600,boxShadow:'0 0 30px rgba(255,107,0,0.3)'}}>→ Score All Concepts</button>
                  </div>
                )}
                {phase==='scoring'&&<div style={{textAlign:'center',padding:32,background:'rgba(255,107,0,0.05)',borderRadius:12,border:'1px solid rgba(255,107,0,0.2)'}}><div style={{fontSize:24,marginBottom:12,animation:'spin 1s linear infinite',display:'inline-block'}}>◌</div><p style={{color:'#ff9500',fontSize:14,margin:0}}>Grading your concepts…</p></div>}
                {scores&&(
                  <div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:16,marginBottom:24}}>
                      {scores.scores?.map((s,i)=>(
                        <div key={i} onClick={()=>setActiveScore(i)} style={{background:activeScore===i?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.02)',border:'1px solid '+(activeScore===i?'rgba(255,107,0,0.3)':'rgba(255,255,255,0.07)'),borderRadius:10,padding:20,cursor:'pointer',transition:'all .2s'}}>
                          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
                            <GradeCircle grade={s.grade}/>
                            <div>
                              <div style={{fontSize:13,color:'#fff',fontWeight:600,marginBottom:3}}>{generated.ad_concepts?.[i]?.title||s.id}</div>
                              <div style={{fontSize:12,color:'#666'}}>{s.score}/100</div>
                            </div>
                          </div>
                          {activeScore===i&&s.breakdown&&(
                            <div>
                              <ScoreBar label="Hook Strength" value={s.breakdown.hook_strength} color="#fb923c"/>
                              <ScoreBar label="Offer Clarity" value={s.breakdown.offer_clarity} color="#818cf8"/>
                              <ScoreBar label="Emotional Pull" value={s.breakdown.emotional_pull} color="#f9a8d4"/>
                              <ScoreBar label="Differentiation" value={s.breakdown.differentiation} color="#4ade80"/>
                              <ScoreBar label="CTA Strength" value={s.breakdown.cta_strength} color="#facc15"/>
                              <div style={{marginTop:12,padding:'10px 14px',background:'rgba(255,255,255,0.03)',borderRadius:6}}><div style={{fontSize:11,color:'#888',marginBottom:4}}>{s.verdict}</div><div style={{fontSize:11,color:'#ff6b00'}}>↑ {s.top_fix}</div></div>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                    {scores.coaching&&<div style={{background:'rgba(129,140,248,0.06)',border:'1px solid rgba(129,140,248,0.2)',borderRadius:10,padding:'16px 20px'}}><div style={{fontSize:11,letterSpacing:'0.12em',color:'#818cf8',textTransform:'uppercase',marginBottom:8}}>Strategic Coaching</div><p style={{fontSize:13,color:'#ccc',lineHeight:1.7,margin:0}}>{scores.coaching}</p></div>}
                  </div>
                )}
              </div>
            )}

            {/* VARIATIONS TAB */}
            {hasGenerated&&activeTab==='variations'&&(
              <div>
                <div style={{fontSize:11,letterSpacing:'0.15em',color:'#666',textTransform:'uppercase',marginBottom:20}}>// A/B Variations{varSource!==null?' — Based on: '+generated.ad_concepts?.[varSource]?.title:''}</div>
                {!variations&&phase!=='variations_loading'&&(
                  <div style={{textAlign:'center',padding:40,background:'rgba(255,255,255,0.02)',borderRadius:12,border:'1px solid rgba(255,255,255,0.07)'}}>
                    <p style={{color:'#666',fontSize:14,marginBottom:8}}>Select a concept from the Intelligence tab and click "A/B Variations" to generate rewrites.</p>
                    <p style={{color:'#444',fontSize:12}}>Or pick one below:</p>
                    <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:16,flexWrap:'wrap'}}>
                      {generated.ad_concepts?.map((c,i)=>(<button key={i} onClick={()=>runVariations(i)} style={{background:'rgba(250,204,21,0.1)',border:'1px solid rgba(250,204,21,0.25)',borderRadius:6,padding:'8px 14px',color:'#facc15',fontSize:12,fontFamily:'inherit',cursor:'pointer'}}>{c.title}</button>))}
                    </div>
                  </div>
                )}
                {phase==='variations_loading'&&<div style={{textAlign:'center',padding:32,background:'rgba(255,107,0,0.05)',borderRadius:12,border:'1px solid rgba(255,107,0,0.2)'}}><div style={{fontSize:24,marginBottom:12,animation:'spin 1s linear infinite',display:'inline-block'}}>◌</div><p style={{color:'#ff9500',fontSize:14,margin:0}}>Generating variations…</p></div>}
                {variations?.variations&&(
                  <div style={{display:'flex',flexDirection:'column',gap:16}}>
                    {variations.variations.map((v,i)=>(
                      <div key={i} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(250,204,21,0.15)',borderRadius:12,padding:24}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:8}}>
                          <div style={{fontSize:13,fontWeight:600,color:'#facc15'}}>{v.label}</div>
                          <span style={{fontSize:11,color:'#888',padding:'3px 10px',background:'rgba(255,255,255,0.04)',borderRadius:4,border:'1px solid rgba(255,255,255,0.08)'}}>{v.tone}</span>
                        </div>
                        {v.hook&&<div style={{fontSize:12,color:'#fb923c',marginBottom:10,padding:'8px 12px',background:'rgba(251,146,60,0.06)',borderRadius:6,border:'1px solid rgba(251,146,60,0.15)'}}><span style={{fontSize:10,letterSpacing:'0.1em',textTransform:'uppercase',marginRight:8}}>Hook:</span>{v.hook}</div>}
                        <h4 style={{fontSize:16,color:'#fff',fontWeight:600,margin:'0 0 10px'}}>{v.headline}</h4>
                        <p style={{fontSize:13,color:'#bbb',lineHeight:1.7,margin:'0 0 14px'}}>{v.body_copy}</p>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                          <span style={{background:'rgba(255,107,0,0.15)',border:'1px solid rgba(255,107,0,0.3)',borderRadius:5,padding:'5px 12px',fontSize:12,color:'#ff9500'}}>{v.cta}</span>
                          {v.key_difference&&<span style={{fontSize:11,color:'#666'}}>↳ {v.key_difference}</span>}
                        </div>
                      </div>
                    ))}
                    <button onClick={()=>runVariations(varSource)} style={{background:'rgba(250,204,21,0.08)',border:'1px solid rgba(250,204,21,0.2)',borderRadius:8,padding:'12px',color:'#facc15',fontSize:12,fontFamily:'inherit',cursor:'pointer'}}>↺ Regenerate Variations</button>
                  </div>
                )}
              </div>
            )}

            {/* LOADING STATES */}
            {phase==='generating'&&<div style={{textAlign:'center',padding:32,background:'rgba(255,107,0,0.05)',borderRadius:12,border:'1px solid rgba(255,107,0,0.2)',marginTop:16}}><div style={{fontSize:24,marginBottom:12,animation:'spin 1s linear infinite',display:'inline-block'}}>◌</div><p style={{color:'#ff9500',fontSize:14,margin:0,letterSpacing:'0.08em'}}>Building your competitive advantage…</p></div>}

            {/* GENERATE BUTTON */}
            {phase==='results'&&(
              <button onClick={runGeneration} style={{background:'linear-gradient(135deg,#ff6b00,#ff9500)',border:'none',borderRadius:8,padding:'16px 28px',color:'#fff',fontSize:14,fontFamily:'inherit',letterSpacing:'0.08em',cursor:'pointer',fontWeight:600,width:'100%',boxShadow:'0 0 40px rgba(255,107,0,0.35)',marginTop:8}}>→ Generate Winning Hooks & Ad Copy</button>
            )}

            {/* SCORE BUTTON (only on analysis tab after generation) */}
            {hasGenerated&&activeTab==='analysis'&&!scores&&phase==='generated'&&(
              <button onClick={runScoring} style={{background:'rgba(129,140,248,0.15)',border:'1px solid rgba(129,140,248,0.3)',borderRadius:8,padding:'12px 28px',color:'#818cf8',fontSize:13,fontFamily:'inherit',cursor:'pointer',width:'100%',marginTop:12}}>⊙ Score All Concepts</button>
            )}

            <button onClick={reset} style={{background:'transparent',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,padding:'12px 24px',color:'#555',fontSize:13,fontFamily:'inherit',cursor:'pointer',width:'100%',marginTop:12,transition:'all .2s'}} onMouseEnter={e=>{e.target.style.borderColor='rgba(255,107,0,0.4)';e.target.style.color='#ff9500';}} onMouseLeave={e=>{e.target.style.borderColor='rgba(255,255,255,0.1)';e.target.style.color='#555';}}>← Run New Analysis</button>
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<MetaAdsIntel/>);
</script>
</body>
</html>
